# [IA-GEN] Generado por APB AI Framework (E-G2) — pendiente revisión humana
# Revisión semestral: abre issue automático con componentes cuyo review_date
# supera 180 días. Se ejecuta el día 1 de cada mes a las 08:00 UTC.
name: Review Date Reminder

on:
  schedule:
    - cron: '0 8 1 * *'   # día 1 de cada mes, 08:00 UTC
  workflow_dispatch:        # permite ejecución manual desde GitHub Actions UI

permissions:
  issues: write
  contents: read

jobs:
  check-review-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Find stale components
        run: python scripts/check_review_dates.py --days 180 --output stale.txt

      - name: Open issue if stale components found
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('stale.txt')) return;
            const body = fs.readFileSync('stale.txt', 'utf8').trim();
            if (!body) {
              console.log('Sin componentes vencidos — no se abre issue.');
              return;
            }
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Revisión] Componentes con review_date vencido >180 días (${today})`,
              body: body,
              labels: ['review-needed', 'automated'],
            });
            console.log('Issue de revisión creado.');
